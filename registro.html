<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Registrarse</title>
</head>
<body class="container" data-bs-theme="dark">
    <h1 class="container p-5 text-center">Registrarse</h1>
    <div class="card">
        <div class="card-body p-3">
            <label for="nombre" class="form-label">Nombre:</label>
            <input class="form-control mb-3" type="text" id="nombre" placeholder="Nombre">
            <label class="form-label" for="email">Correo:</label>
            <input class="form-control" type="email" id="email" placeholder="correo@ejemplo.com" required>
            <table class="table table-borderless">
                <tr>
                    <td><label class="form-label">Contraseña:</label></td>
                    <td><label class="form-label">Confirmar Contraseña:</label></td>
                </tr>
                <tr>
                    <td><input type="password" id="password" placeholder="Contraseña" class="form-control"></td>
                    <td><input type="password" id="confirmPassword" placeholder="Confirmar contraseña" class="form-control"></td>
                </tr>
            </table>
            <button class="btn btn-primary" id="btnRegistrar">Registrar</button>
        </div>
        <div class="card-footer text-center">
            <label class="form-label">¿Ya tienes cuenta?</label>
            <a href="login.html">Iniciar sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/registro.js"></script>
</body>
</html>
