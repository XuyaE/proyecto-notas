<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Iniciar sesión</title>
</head>
<body data-bs-theme="dark" class="container">
    <h1 class="container text-center m-5">Iniciar sesión</h1>
    <div class="card">
        <div class="card-body">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" placeholder="Email" class="form-control mb-3">
            <label for="password" class="form-label">Contraseña:</label>
            <input type="password" placeholder="Contraseña" class="form-control mb-3" id="password">
            <button class="btn btn-primary" id="btnIngresa">Ingresar</button>
        </div>
        <div class="card-footer text-center">
            <label class="form-label">¿Aún no tienes cuenta?</label>
            <a href="./index.html">Registrate aquí</a>
        </div>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
