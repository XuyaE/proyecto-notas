<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Notas</title>
</head>
<body data-bs-theme="dark" class="container">
    <header style="height: 70px;" class="container p-3 d-flex justify-content-between align-items-center">
        <label id="userTitle" class="h-100 d-flex align-items-center fs-4"></label>
        <button id="btnLogOut" class="btn h-100 d-flex align-items-center p-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-box-arrow-right h-100" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
        </svg>
        </button>
    </header>
    <h1 class="container text-center m-5">Mis Notas</h1>
    <div class="card p-3 mb-5">
        <label class="form-label" for="title">Título para la nota:</label>
        <input class="form-control mb-2" type="text" id="title" placeholder="Título de la nota">
        <label class="form-label" for="nota">Escribe tu nota:</label>
        <input class="form-control mb-2" id="nota" type="text" placeholder="Insertar texto">
        <button id="agrega" class="btn btn-primary mt-2 ">Guardar</button>
    </div>
    <div class="container">
        <h3><label for="" class="mb-3">Notas guardadas:</label></h3>
        <ul class="list-group" id="lista">
            
        </ul>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar nota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="editTitulo" class="form-control mb-2" placeholder="Titulo">
                    <textarea id="editTexto" class="form-control" rows="4" placeholder="Texto"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button id="btnGuardarCambios" class="btn btn primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
